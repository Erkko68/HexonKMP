name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set production env (api subdomain + port)
        run: |
          echo "SERVER_HOST=api.hexon.biri.es" >> .env
          echo "SERVER_PORT=8080" >> .env

      - name: Generate EnvConfig
        run: ./gradlew generateEnvConfig --no-daemon --no-configuration-cache

      - name: Build web bundle
        run: ./gradlew :app:webApp:jsBrowserDistribution --no-daemon --no-configuration-cache

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/webApp/build/dist/js/productionExecutable

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
