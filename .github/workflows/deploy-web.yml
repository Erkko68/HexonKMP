name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'core/**'
      - 'gradle/**'
      - 'gradlew'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Cache Kotlin/JS & Konan
        uses: actions/cache@v4
        with:
          path: |
            ~/.konan
            kotlin-js-store
            build/js
          key: ${{ runner.os }}-kjs-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-kjs-

      - name: Set production env (api subdomain + port)
        run: |
          echo "SERVER_HOST=api.hexon.biri.es" >> .env
          echo "SERVER_PORT=443" >> .env

      - name: Generate EnvConfig
        run: ./gradlew generateEnvConfig --no-daemon --no-configuration-cache

      - name: Build web bundle
        run: ./gradlew :app:webApp:jsBrowserDistribution --no-daemon --no-configuration-cache

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/webApp/build/dist/js/productionExecutable

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
