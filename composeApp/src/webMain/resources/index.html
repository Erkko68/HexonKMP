<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compose + Three.js</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        /* 1. The Three.js Canvas (Background) */
        #three-root {
            position: fixed;
            inset: 0;
            z-index: 0;
            display: block;
        }

        /* 2. The Compose Container (Foreground) */
        #compose-root {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: auto; /* Allows UI interaction */
        }

        /* 3. The Transparency Fix */
        /* Since main() mounts into #compose-root, this selector now works! */
        #compose-root canvas {
            background-color: transparent !important;
        }
    </style>
</head>

<body>
<canvas id="three-root"></canvas>

<div id="compose-root"></div>

<script src="composeApp.js"></script>
</body>
</html>
