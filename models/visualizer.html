<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GLB Material Change Example</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1;
      background: rgba(255,255,255,0.8);
      padding: 10px;
      border-radius: 8px;
    }
    #ui input { margin-bottom: 5px; display: block; }
  </style>
  
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="ui">
    <input type="file" id="fileInput" accept=".glb">
    <input type="color" id="colorPicker" value="#ff0000">
  </div>

  <script type="module">
    // FIX: Use the mapped names defined in the importmap above
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Scene, Camera, Renderer
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(2, 2, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);

    // Light
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    let playerMaterial; // Reference to the material we want to change
    let currentModel;   // Keep track of the loaded model
    const loader = new GLTFLoader();

    // File input for GLB
    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);

      // Remove previous model if any
      if (currentModel) {
        scene.remove(currentModel);
        currentModel.traverse(child => {
          if (child.isMesh) child.geometry.dispose();
        });
      }

      loader.load(url, gltf => {
        currentModel = gltf.scene;
        scene.add(currentModel);

        // Find the mesh with material named 'playerColor'
        playerMaterial = null;
        currentModel.traverse(child => {
          if (child.isMesh && child.material && child.material.name === 'playerColor') {
            playerMaterial = child.material;
          }
        });
      });
    });

    // Color picker to change material color
    const colorPicker = document.getElementById('colorPicker');
    colorPicker.addEventListener('input', e => {
      if (playerMaterial) {
        playerMaterial.color.set(e.target.value);
      }
    });

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Render loop
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
