<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Fill colors: hex, short hex, named -->
    <rect x="10" y="10" width="50" height="30" fill="#FF5733"/>
    <rect x="70" y="10" width="50" height="30" fill="#F00"/>
    <rect x="130" y="10" width="50" height="30" fill="coral"/>
    <rect x="190" y="10" width="50" height="30" fill="none" stroke="black"/>

    <!-- Opacity variants -->
    <rect x="10" y="60" width="50" height="30" fill="#FF0000" opacity="1"/>
    <rect x="70" y="60" width="50" height="30" fill="#FF0000" opacity="0.75"/>
    <rect x="130" y="60" width="50" height="30" fill="#FF0000" opacity="0.5"/>
    <rect x="190" y="60" width="50" height="30" fill="#FF0000" opacity="0.25"/>

    <!-- Fill opacity -->
    <rect x="10" y="110" width="50" height="30" fill="#00FF00" fill-opacity="1"/>
    <rect x="70" y="110" width="50" height="30" fill="#00FF00" fill-opacity="0.75"/>
    <rect x="130" y="110" width="50" height="30" fill="#00FF00" fill-opacity="0.5"/>
    <rect x="190" y="110" width="50" height="30" fill="#00FF00" fill-opacity="0.25"/>

    <!-- Stroke variants -->
    <line x1="10" y1="170" x2="100" y2="170" stroke="#000000" stroke-width="1"/>
    <line x1="10" y1="190" x2="100" y2="190" stroke="#000000" stroke-width="3"/>
    <line x1="10" y1="210" x2="100" y2="210" stroke="#000000" stroke-width="5"/>

    <!-- Stroke opacity -->
    <line x1="120" y1="170" x2="210" y2="170" stroke="#0000FF" stroke-width="3" stroke-opacity="1"/>
    <line x1="120" y1="190" x2="210" y2="190" stroke="#0000FF" stroke-width="3" stroke-opacity="0.5"/>
    <line x1="120" y1="210" x2="210" y2="210" stroke="#0000FF" stroke-width="3" stroke-opacity="0.25"/>

    <!-- Stroke linecap -->
    <line x1="10" y1="260" x2="100" y2="260" stroke="#000000" stroke-width="10" stroke-linecap="butt"/>
    <line x1="120" y1="260" x2="210" y2="260" stroke="#000000" stroke-width="10" stroke-linecap="round"/>
    <line x1="230" y1="260" x2="320" y2="260" stroke="#000000" stroke-width="10" stroke-linecap="square"/>

    <!-- Stroke linejoin -->
    <polyline points="10,310 50,350 90,310" fill="none" stroke="#000000" stroke-width="10" stroke-linejoin="miter"/>
    <polyline points="120,310 160,350 200,310" fill="none" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
    <polyline points="230,310 270,350 310,310" fill="none" stroke="#000000" stroke-width="10" stroke-linejoin="bevel"/>

    <!-- CSS inline style -->
    <rect x="10" y="380" width="50" height="30" style="fill:#FF00FF;stroke:#000000;stroke-width:2"/>
    <rect x="70" y="380" width="50" height="30" style="fill:cornflowerblue;opacity:0.8"/>
    <circle cx="180" cy="395" r="15" style="fill:none;stroke:#FF6600;stroke-width:3px"/>

    <!-- Group style inheritance -->
    <g fill="red" stroke="blue" stroke-width="2">
        <rect x="10" y="430" width="50" height="30"/>
        <rect x="70" y="430" width="50" height="30" fill="green"/>
        <circle cx="180" cy="445" r="15"/>
    </g>
</svg>
