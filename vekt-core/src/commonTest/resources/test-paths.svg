<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- M, L commands -->
    <path d="M10,10 L100,10 L100,50 L10,50 Z" fill="#FF0000"/>

    <!-- H, V commands -->
    <path d="M120,10 H220 V50 H120 Z" fill="#00FF00"/>

    <!-- Relative commands -->
    <path d="M230,10 l90,0 l0,40 l-90,0 z" fill="#0000FF"/>

    <!-- Cubic Bezier -->
    <path d="M10,100 C50,50 100,150 150,100" fill="none" stroke="#FF00FF" stroke-width="2"/>

    <!-- Smooth cubic -->
    <path d="M170,100 C210,50 260,150 310,100 S410,50 460,100" fill="none" stroke="#00FFFF" stroke-width="2"/>

    <!-- Quadratic Bezier -->
    <path d="M10,200 Q80,150 150,200" fill="none" stroke="#FF6600" stroke-width="2"/>

    <!-- Smooth quadratic -->
    <path d="M170,200 Q240,150 310,200 T450,200" fill="none" stroke="#6600FF" stroke-width="2"/>

    <!-- Arc command -->
    <path d="M10,300 A50,50 0 0 1 110,300" fill="none" stroke="#000000" stroke-width="2"/>
    <path d="M130,300 A50,50 0 0 0 230,300" fill="none" stroke="#333333" stroke-width="2"/>
    <path d="M250,300 A50,50 0 1 1 350,300" fill="none" stroke="#666666" stroke-width="2"/>
    <path d="M370,300 A50,50 0 1 0 470,300" fill="none" stroke="#999999" stroke-width="2"/>

    <!-- Complex path -->
    <path d="M256,400 C256,350 306,350 306,400 C306,450 256,500 256,450 C256,400 206,400 206,450 C206,500 256,450 256,400 Z" fill="#FF69B4"/>
</svg>
