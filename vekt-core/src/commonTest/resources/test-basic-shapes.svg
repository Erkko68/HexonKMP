<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Basic rectangle -->
    <rect x="10" y="10" width="100" height="50" fill="#FF0000"/>

    <!-- Rounded rectangle -->
    <rect x="120" y="10" width="100" height="50" rx="10" ry="5" fill="#00FF00"/>

    <!-- Circle -->
    <circle cx="300" cy="35" r="25" fill="#0000FF"/>

    <!-- Ellipse -->
    <ellipse cx="400" cy="35" rx="40" ry="20" fill="#FF00FF"/>

    <!-- Line -->
    <line x1="10" y1="80" x2="200" y2="80" stroke="#000000" stroke-width="2"/>

    <!-- Polyline -->
    <polyline points="220,80 250,100 280,80 310,100 340,80" fill="none" stroke="#FF6600" stroke-width="2"/>

    <!-- Polygon (star) -->
    <polygon points="400,70 420,130 470,130 430,160 450,220 400,180 350,220 370,160 330,130 380,130" fill="#FFFF00"/>
</svg>
