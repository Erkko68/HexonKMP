<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Original -->
    <rect x="10" y="10" width="50" height="30" fill="#FF0000"/>

    <!-- Translate -->
    <rect x="10" y="10" width="50" height="30" fill="#00FF00" transform="translate(100, 0)"/>

    <!-- Scale -->
    <rect x="200" y="10" width="50" height="30" fill="#0000FF" transform="scale(1.5)"/>

    <!-- Rotate -->
    <rect x="350" y="30" width="50" height="30" fill="#FF00FF" transform="rotate(45 375 45)"/>

    <!-- SkewX -->
    <rect x="10" y="100" width="50" height="30" fill="#00FFFF" transform="skewX(20)"/>

    <!-- SkewY -->
    <rect x="120" y="100" width="50" height="30" fill="#FFFF00" transform="skewY(20)"/>

    <!-- Matrix -->
    <rect x="250" y="100" width="50" height="30" fill="#FF6600" transform="matrix(1 0.2 0.2 1 0 0)"/>

    <!-- Combined transforms -->
    <rect x="10" y="200" width="50" height="30" fill="#6600FF" transform="translate(100, 0) rotate(30) scale(1.2)"/>

    <!-- Group with transform -->
    <g transform="translate(0, 300)">
        <rect x="10" y="0" width="50" height="30" fill="#FF0000"/>
        <rect x="70" y="0" width="50" height="30" fill="#00FF00"/>
        <rect x="130" y="0" width="50" height="30" fill="#0000FF"/>
    </g>

    <!-- Nested groups with transforms -->
    <g transform="translate(250, 300)">
        <rect x="0" y="0" width="30" height="30" fill="#CCCCCC"/>
        <g transform="translate(40, 0) rotate(15)">
            <rect x="0" y="0" width="30" height="30" fill="#999999"/>
            <g transform="translate(40, 0) scale(0.8)">
                <rect x="0" y="0" width="30" height="30" fill="#666666"/>
            </g>
        </g>
    </g>
</svg>
